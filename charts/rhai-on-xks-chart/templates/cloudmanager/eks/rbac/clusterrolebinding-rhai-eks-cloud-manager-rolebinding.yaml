{{- if .Values.eks.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhai-eks-cloud-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhai-eks-cloud-manager-role
subjects:
  - kind: ServiceAccount
    name: eks-cloud-manager-operator
    namespace: {{ .Values.eks.cloudManager.namespace }}
{{- end }}
